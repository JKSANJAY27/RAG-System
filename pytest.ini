# pytest.ini — pytest configuration for the RAG system
#
# WHY THIS FILE EXISTS:
#   Without this, pytest warns about unknown markers (@pytest.mark.eval).
#   This file registers custom markers so CI and local runs both behave identically.
#
# MARKER STRATEGY:
#   "not eval"  → Fast CI — runs in ~30s, no Ollama/GPU needed. Always passes in CI.
#   "eval"      → Quality gate — needs running Ollama, auto-skips if unavailable.
#
# HOW THEY ARE USED IN CI (see .github/workflows/ci.yml):
#   Fast job (every push):  pytest tests/ -m "not eval" -v
#   Quality gate (manual):  python evals/run_evals.py --ci

[pytest]
markers =
    eval: tests requiring a live Ollama server (auto-skipped if unavailable)
    integration: tests that download embedding models on first run (slow)

# Paths to search for tests
testpaths = tests

# Short traceback format — cleaner CI output
# Use --tb=long locally when debugging
addopts = --tb=short

# Suppress third-party deprecation warnings that we can't fix
# (e.g. hf_transfer, chromadb internals)
filterwarnings =
    ignore::DeprecationWarning:chromadb.*
    ignore::DeprecationWarning:huggingface_hub.*
    ignore::FutureWarning:transformers.*
