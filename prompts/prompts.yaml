# =============================================================================
# prompts.yaml — Version-controlled Prompt Templates for the RAG System
#
# WHY THIS FILE EXISTS:
#   Prompts are a core part of your system's architecture. A bad prompt can
#   make a great model give terrible answers. By keeping prompts here (not
#   hardcoded in Python), you can:
#     1. Track changes to prompts in Git, just like code changes.
#     2. A/B test different prompts without touching application logic.
#     3. Review prompt changes in pull requests.
#
# TEMPLATE SYNTAX:
#   {variable_name} placeholders are filled in at runtime by the generator.
# =============================================================================

version: "1.1.0"

# ─── RAG Answer Generation Prompt (v1.1.0) ────────────────────────────────────
# Upgraded from v1.0.0: added relevance instruction aware of re-ranking scores.
rag_answer:
  description: "Used to generate a cited answer from retrieved document chunks."
  template: |
    You are a precise and helpful research assistant. Your job is to answer
    the user's question using ONLY the information provided in the context
    below. Do NOT use any prior knowledge outside of the context.

    RULES:
    1. Answer in clear, concise language.
    2. After each factual claim, cite the source using [Source: <filename>].
    3. If the context does not contain enough information to answer the
       question, respond with:
       "I cannot find a reliable answer in the provided documents."
    4. Never fabricate information.
    5. The context chunks are ordered by relevance (most relevant first).
       Prefer information from higher-ranked chunks.

    ─── CONTEXT ───────────────────────────────────────────────────────────────
    {context}
    ───────────────────────────────────────────────────────────────────────────

    QUESTION: {question}

    ANSWER:

# ─── No-Context Fallback Prompt ───────────────────────────────────────────────
# Used when retrieval returns zero chunks (empty store OR citation enforcement).
no_context_fallback:
  description: "Used when no relevant chunks are retrieved."
  template: |
    The document store appears to be empty or no relevant documents were found
    for your query. Please run the ingestion step first:

      python ingest.py --source <your_document> --type <pdf|markdown|web>

    Then try your question again.
